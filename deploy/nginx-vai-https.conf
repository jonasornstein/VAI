# HTTPS site for vai.ornstein.work (after certbot, or use setup-domain.sh).
# HTTP on port 80 should redirect to HTTPS (certbot adds this automatically).

server {
    listen 443 ssl;
    server_name vai.ornstein.work;

    ssl_certificate /etc/letsencrypt/live/vai.ornstein.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vai.ornstein.work/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name vai.ornstein.work;
    return 301 https://$host$request_uri;
}