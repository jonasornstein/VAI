      <stop offset="0%" stop-color="#006db6"/>
      <stop offset="100%" stop-color="#004f9f"/>
    </linearGradient>
    <linearGradient id="mane" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f39332"/>
      <stop offset="100%" stop-color="#ee7202"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <ellipse cx="32" cy="52" rx="22" ry="4" fill="rgba(0,0,0,0.15)"/>
  <!-- sulky -->
  <path d="M14 38h28l4 8H10z" fill="#fff" opacity="0.95"/>
  <circle cx="18" cy="46" r="3.5" fill="#dce0e7" stroke="#00366c" stroke-width="1"/>
  <circle cx="46" cy="46" r="3.5" fill="#dce0e7" stroke="#00366c" stroke-width="1"/>
